<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Wingbot953 Chat</title>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.21.2/babel.min.js"></script>
        <style>
            body {
                margin: 0;
                padding: 0;
                background-color: #222;
                font-family: "Aptos", sans-serif;
                color: white;
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            #root {
                width: 100%;
                max-width: 600px;
                height: 90vh;
            }

            .chat-container {
                height: 100%;
                border-radius: 8px;
                background-color: black;
                padding: 10px;
                overflow: hidden;
                display: flex;
                flex-direction: column;
                justify-content: flex-end; /* Align content to bottom */
                max-width: 100%;
            }

            .message-window {
                overflow-y: hidden; /* Prevent vertical scrolling */
                overflow-x: hidden; /* Prevent horizontal scrolling */
                overflow: hidden; /* Prevent both horizontal and vertical scrolling */
                display: flex;
                flex-direction: column;
                width: 100%;
            }

            .message {
                margin-bottom: 12px;
                display: flex;
                align-items: flex-start;
                width: 100%;
                max-width: 100%;
                flex-wrap: wrap; /* Allow the message to wrap */
            }

            .platform-icon {
                width: 20px;
                height: 20px;
                margin-right: 8px;
                flex-shrink: 0;
                background-color: transparent; /* Ensure transparency is preserved */
                image-rendering: crisp-edges; /* For sharper pixel art icons */
            }

            .icons-container {
                display: flex;
                align-items: center;
                flex-shrink: 0;
                margin-right: 8px;
                background-color: transparent; /* Ensure container doesn't block transparency */
            }

            .author {
                /* Base styling - color will be overridden by JS */
                color: #b4b4b4; /* Default light grey */
                font-weight: bold;
                margin-right: 5px;
                font-size: 1.15em;
                flex-shrink: 0; /* Prevent username from shrinking */
                /*white-space: nowrap; /* Keep author on one line */
            }

            .message-text {
                color: white;
                text-align: left;
                font-size: 1.3em;
                display: block; /* Force the message text to start on a new line */
                word-wrap: break-word;
                word-break: break-word;
                overflow-wrap: break-word;
            }

            .inline-emote {
                height: 30px;
                width: auto;
                margin: 0 3px;
                vertical-align: middle;
                display: inline-block;
                background-color: transparent; /* Ensure transparency is preserved */
                image-rendering: crisp-edges; /* For sharper pixel art emotes */
            }
        </style>
    </head>
    <body>
        <div id="root"></div>

        <script type="text/babel">
            const { useState, useEffect, useRef } = React

            // Emote mapping
            const emoteMap = {
                wingma14Mombasa: "./images/emotes/NewMombasaLogo.png",
                wingma14Automag: "./images/emotes/WingmanAutomag.png",
                wingma14Cone: "./images/emotes/WingmanCone.png",
                wingma14Turret: "./images/emotes/WingmanTurret.png",
                wingma14KeepItClean: "./images/emotes/KeepItClean.png",
                wingma14Pet: "./images/emotes/WingmanPet.gif",
                wingma14Quiz: "./images/emotes/WingmanQuiz.png",
                wingma14Start: "./images/emotes/WingmanStart.png",
                wingma14ThinkItClean: "./images/emotes/WingmanThinkItClean.png",
                wingma14Good: "./images/emotes/WingmanGood.png",
                wingma14Blaster: "./images/emotes/WingmanLaserBlaster.png",
                wingma14Evil: "./images/emotes/WingmanEvil.png",
                wingma14Blush: "./images/emotes/WingmanAdore.png",
                wingma14Aim: "./images/emotes/WingmanAim.gif",
                wingma14Arrive: "./images/emotes/WingmanArrive.png",
                wingma14Christmas: "./images/emotes/WingmanChristmas.gif",
                wingma14Jam: "./images/emotes/WingmanJam.gif",
                wingma14Laser: "./images/emotes/WingmanLaser.png",
                wingma14Dutch: "./images/emotes/WingmanLaserDutch.png",
                wingma14LaserHit: "./images/emotes/WingmanLaserHit.png",
                wingma14Mickey: "./images/emotes/WingmanMickey.png",
                wingma14Pray: "./images/emotes/wingmanPray.png",
                wingma14Romeo: "./images/emotes/WingmanRomeo.png",
                wingma14Scared: "./images/emotes/WingmanScared.gif",
                wingma14Think: "./images/emotes/WingmanThink.png",
                wingma14Dance: "./images/emotes/WingmanDance.gif",
            }

            // Function to get platform icon
            const getPlatformIcon = (platform) => {
                switch (platform) {
                    case "youtube":
                        return "./images/icons/youtube-icon.png"
                    case "twitch":
                        return "./images/icons/twitch-icon.png"
                    case "system":
                    default:
                        return "./images/icons/wrench-icon.png" // https://iconduck.com/icons/255547/setting-wrench
                }
            }

            // Function to parse message text and replace emotes
            const parseMessageWithEmotes = (text, msgEmoteMap) => {
                if (!text) return []

                // Combine predefined emotes with message-specific emotes
                const combinedEmoteMap = { ...emoteMap }

                // Add message-specific emotes if they exist
                if (msgEmoteMap && Array.isArray(msgEmoteMap)) {
                    msgEmoteMap.forEach((emote) => {
                        if (emote.name && emote.url) {
                            combinedEmoteMap[emote.name] = emote.url
                        }
                    })
                }

                // Split the text by potential emotes
                const parts = []
                let lastIndex = 0

                const escapedKeys = Object.keys(combinedEmoteMap).map((key) =>
                    key.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")
                )

                // Regular expression to find emote patterns
                const emotePattern = new RegExp(
                    `(${escapedKeys.join("|")})`,
                    "g"
                )

                let match
                while ((match = emotePattern.exec(text)) !== null) {
                    // Add text before the emote
                    if (match.index > lastIndex) {
                        parts.push({
                            type: "text",
                            content: text.substring(lastIndex, match.index),
                        })
                    }

                    // Add the emote
                    parts.push({
                        type: "emote",
                        content: match[0],
                        src: combinedEmoteMap[match[0]],
                    })

                    lastIndex = match.index + match[0].length
                }

                // Add remaining text
                if (lastIndex < text.length) {
                    parts.push({
                        type: "text",
                        content: text.substring(lastIndex),
                    })
                }

                return parts.length > 0
                    ? parts
                    : [{ type: "text", content: text }]
            }

            // Alphabet color mapping - high contrast colors for dark backgrounds
            const alphabetColors = {
                a: "#FF0000", // Saturated red
                b: "#00FF00", // Saturated green
                c: "#0000FF", // Saturated blue
                d: "#FFFF00", // Saturated yellow
                e: "#FF00FF", // Saturated magenta
                f: "#00FFFF", // Saturated cyan
                g: "#FF6600", // Saturated orange
                h: "#00FF66", // Saturated mint
                i: "#6600FF", // Saturated purple
                j: "#FFFF00", // Saturated yellow (was pale)
                k: "#FF0066", // Saturated pink
                l: "#00FFFF", // Saturated cyan (was pale)
                m: "#FFFFFF", // White (unchanged)
                n: "#FF3333", // More saturated red
                o: "#33FF33", // More saturated green
                p: "#3333FF", // More saturated blue
                q: "#FFFF33", // More saturated yellow
                r: "#FF33FF", // More saturated magenta
                s: "#33FFFF", // More saturated cyan
                t: "#FF9900", // More saturated orange
                u: "#33FF99", // More saturated mint
                v: "#9933FF", // More saturated purple
                w: "#FFFF66", // More saturated yellow
                x: "#FF3399", // More saturated pink
                y: "#66FFFF", // More saturated cyan
                z: "#CCCCCC", // Light gray (more saturated than near-white)
            }

            // Default color for non-alphabet characters
            const defaultColor = "#BBBBBB" // Light grey

            // Function to get color for author name
            const getAuthorColor = (name) => {
                if (!name || name.length === 0) return defaultColor

                // Get first character and convert to lowercase
                const firstChar = name.charAt(0).toLowerCase()

                // Return the corresponding color or default if not a letter
                return alphabetColors[firstChar] || defaultColor
            }

            // Message Component
            const Message = ({ msg }) => {
                // Sample additional icons - in a real app, these would come from your data
                // This is just for demonstration, could be empty array or multiple icons
                const additionalIcons = msg.additionalIcons || []

                // Get color for this author
                let authorColor = getAuthorColor(msg.author.displayName)
                if (msg.author.colour) {
                    authorColor = msg.author.colour
                }

                return (
                    <div className="message">
                        <div className="icons-container">
                            <img
                                className="platform-icon"
                                src={getPlatformIcon(msg.platform)}
                                alt={msg.platform}
                            />
                            {/* Render any additional icons */}
                            {additionalIcons.map((icon, index) => (
                                <img
                                    key={index}
                                    className="platform-icon"
                                    src={icon.src}
                                    alt={icon.alt || "icon"}
                                />
                            ))}
                        </div>
                        <div className="author" style={{ color: authorColor }}>
                            {msg.author.displayName}:
                        </div>
                        <div className="message-text">
                            {parseMessageWithEmotes(
                                msg.message.text,
                                msg.message.emoteMap
                            ).map((part, i) =>
                                part.type === "text" ? (
                                    <span key={i}>{part.content}</span>
                                ) : (
                                    <img
                                        key={i}
                                        src={part.src}
                                        alt={part.content}
                                        className="inline-emote"
                                        title={part.content}
                                    />
                                )
                            )}
                        </div>
                    </div>
                )
            }

            // Chat Application
            const ChatApp = () => {
                const [messages, setMessages] = useState([])
                const [socket, setSocket] = useState(null)
                const messageWindowRef = useRef(null)

                useEffect(() => {
                    // Initialize WebSocket connection
                    const ws = new WebSocket("ws://localhost:8080")

                    ws.onopen = () => {
                        console.log("Connected to WebSocket server")
                    }

                    ws.onmessage = (event) => {
                        try {
                            const message = JSON.parse(event.data)
                            setMessages((prevMessages) => {
                                // Keep only the most recent 20 messages
                                const updatedMessages = [
                                    ...prevMessages,
                                    message,
                                ]
                                return updatedMessages.slice(-20)
                            })
                        } catch (error) {
                            console.error("Error parsing message:", error)
                        }
                    }

                    ws.onerror = (error) => {
                        console.error("WebSocket error:", error)
                    }

                    ws.onclose = () => {
                        console.log("Disconnected from WebSocket server")
                    }

                    setSocket(ws)

                    // Clean up WebSocket connection when component unmounts
                    return () => {
                        if (ws) {
                            ws.close()
                        }
                    }
                }, [])

                useEffect(() => {
                    // Auto-scroll to the bottom when new messages arrive
                    if (messageWindowRef.current) {
                        messageWindowRef.current.scrollTop =
                            messageWindowRef.current.scrollHeight
                    }
                }, [messages])

                return (
                    <div className="chat-container">
                        <div className="message-window" ref={messageWindowRef}>
                            {messages.map((msg, index) => (
                                <Message key={index} msg={msg} />
                            ))}
                        </div>
                    </div>
                )
            }

            ReactDOM.render(<ChatApp />, document.getElementById("root"))
        </script>
    </body>
</html>
