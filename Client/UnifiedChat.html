<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Wingbot953 Chat</title>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.21.2/babel.min.js"></script>
        <style>
            body {
                margin: 0;
                padding: 0;
                background-color: #222;
                font-family: "Aptos", sans-serif;
                color: white;
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            #root {
                width: 100%;
                max-width: 600px;
                height: 100vh;
            }

            .chat-container {
                height: 100%;
                border-radius: 8px;
                background-color: black;
                padding: 10px;
                overflow: hidden;
                display: flex;
                flex-direction: column;
                justify-content: flex-end; /* Align content to bottom */
                max-width: 100%;
            }

            .message-window {
                overflow-y: hidden; /* Default: Prevent vertical scrolling */
                overflow-x: hidden; /* Prevent horizontal scrolling */
                display: flex;
                flex-direction: column;
                width: 100%;
            }

            /* Admin mode scrolling */
            .message-window.admin-mode {
                overflow-y: scroll; /* Enable vertical scrolling in admin mode */
            }

            /* Non-admin mode - increase content size by 20% */
            .message-window:not(.admin-mode) .platform-icon {
                width: 24px;
                height: 24px;
            }

            .message-window:not(.admin-mode) .badge-icon {
                width: 24px;
                height: 24px;
            }

            .message-window:not(.admin-mode) .author {
                font-size: 1.44em;
            }

            .message-window:not(.admin-mode) .message-text {
                font-size: 1.56em;
            }

            .message-window:not(.admin-mode) .inline-emote {
                height: 36px;
            }

            .message {
                margin-bottom: 12px;
                display: flex;
                align-items: flex-start;
                width: 100%;
                max-width: 100%;
                flex-wrap: wrap; /* Allow the message to wrap */
            }

            .platform-icon {
                width: 20px;
                height: 20px;
                margin-right: 8px;
                flex-shrink: 0;
                background-color: transparent; /* Ensure transparency is preserved */
                image-rendering: crisp-edges; /* For sharper pixel art icons */
            }

            /* New style for badges */
            .badge-icon {
                width: 20px;
                height: 20px;
                margin-right: 4px;
                flex-shrink: 0;
                background-color: transparent;
                image-rendering: crisp-edges;
            }

            .icons-container {
                display: flex;
                align-items: center;
                flex-shrink: 0;
                margin-right: 8px;
                background-color: transparent; /* Ensure container doesn't block transparency */
            }

            .author {
                /* Base styling - color will be overridden by JS */
                color: #b4b4b4; /* Default light grey */
                font-weight: bold;
                margin-right: 5px;
                font-size: 1.2em;
                flex-shrink: 0; /* Prevent username from shrinking */
                /*white-space: nowrap; /* Keep author on one line */
            }

            .message-text {
                color: white;
                text-align: left;
                font-size: 1.3em;
                display: block; /* Force the message text to start on a new line */
                word-wrap: break-word;
                word-break: break-word;
                overflow-wrap: break-word;
            }

            .inline-emote {
                height: 30px;
                width: auto;
                margin: 0 3px;
                vertical-align: middle;
                display: inline-block;
                background-color: transparent; /* Ensure transparency is preserved */
                image-rendering: crisp-edges; /* For sharper pixel art emotes */
            }

            /* Admin style inputs */
            .admin-panel-container {
                margin-top: 10px;
                display: flex;
                width: 100%;
            }

            .admin-ad-button {
                margin: 0px 4px;
                padding: 8px 16px;
                background-color: #8a0500;
                color: white;
                border: none;
                border-radius: 4px 4px 4px 4px;
                cursor: pointer;
                font-weight: bold;
            }

            .admin-ad-button:hover {
                background-color: #630300;
            }

            /* Admin input styles */
            .admin-input-container {
                margin-top: 10px;
                display: flex;
                width: 100%;
            }

            .admin-input {
                flex: 1;
                padding: 8px 12px;
                border-radius: 4px 0 0 4px;
                border: 1px solid #444;
                background-color: #333;
                color: white;
                font-size: 1.1em;
            }

            .admin-send-button {
                padding: 8px 16px;
                background-color: #0066cc;
                color: white;
                border: none;
                border-radius: 0 4px 4px 0;
                cursor: pointer;
                font-weight: bold;
            }

            .admin-send-button:hover {
                background-color: #0055aa;
            }

            .message.special-message {
                position: relative;
                padding: 10px;
                border-radius: 6px;
                margin-bottom: 16px;
                z-index: 1;
                box-sizing: border-box;
            }

            .message.special-message::before {
                content: "";
                position: absolute;
                inset: 0;
                border-radius: 6px;
                z-index: -1;
                opacity: 0.85;
                box-sizing: border-box;
            }

            /* Subscription - Orange */
            .message.sub-message::before {
                background: linear-gradient(135deg, #c45100 0%, #8a3a00 100%);
                border: 2px solid #ff6b1a;
                box-shadow: 0 0 12px rgba(255, 107, 26, 0.5);
            }

            /* Moderation - Red */
            .message.moderation-message::before {
                background: linear-gradient(135deg, #a51b1b 0%, #6e0f0f 100%);
                border: 2px solid #e63939;
                box-shadow: 0 0 12px rgba(230, 57, 57, 0.5);
            }

            /* Activity - Green */
            .message.activity-message::before {
                background: linear-gradient(135deg, #1a7a3a 0%, #0f5227 100%);
                border: 2px solid #2ecc40;
                box-shadow: 0 0 12px rgba(46, 204, 64, 0.5);
            }

            /* Notification - Blue */
            .message.notification-message::before {
                background: linear-gradient(135deg, #1456a0 0%, #0b3366 100%);
                border: 2px solid #3d9df6;
                box-shadow: 0 0 12px rgba(61, 157, 246, 0.5);
            }

            /* Bits & YouTube SuperChat - Purple */
            .message.bits-message::before,
            .message.superchat-message::before {
                background: linear-gradient(135deg, #7b2fbe 0%, #4a1a75 100%);
                border: 2px solid #b44dff;
                box-shadow: 0 0 12px rgba(180, 77, 255, 0.5);
            }

            /* Twitch highlighted chat message - Grey */
            .message.highlighted-message::before {
                background: linear-gradient(135deg, #4a4a4a 0%, #2e2e2e 100%);
                border: 2px solid #777;
                box-shadow: 0 0 10px rgba(150, 150, 150, 0.4);
            }

            /* /me action messages - italic, no special background */
            .message.action-message .message-text {
                font-style: italic;
            }
        </style>
    </head>
    <body>
        <div id="root"></div>

        <script type="text/babel">
            const { useState, useEffect, useRef } = React

            // Emote mapping
            const emoteMap = {
                wingma14ThinkFace: "./images/emotes/ThinkingFaceEmoji.png",
                wingma14Mombasa: "./images/emotes/NewMombasaLogo.png",
                wingma14Automag: "./images/emotes/WingmanAutomag.png",
                wingma14Cone: "./images/emotes/WingmanCone.png",
                wingma14Turret: "./images/emotes/WingmanTurret.png",
                wingma14KeepItClean: "./images/emotes/KeepItClean.png",
                wingma14Pet: "./images/emotes/WingmanPet.gif",
                wingma14Quiz: "./images/emotes/WingmanQuiz.png",
                wingma14Start: "./images/emotes/WingmanStart.png",
                wingma14ThinkItClean: "./images/emotes/WingmanThinkItClean.png",
                wingma14Good: "./images/emotes/WingmanGood.png",
                wingma14Blaster: "./images/emotes/WingmanLaserBlaster.png",
                wingma14Evil: "./images/emotes/WingmanEvil.png",
                wingma14Blush: "./images/emotes/WingmanAdore.png",
                wingma14Aim: "./images/emotes/WingmanAim.gif",
                wingma14Arrive: "./images/emotes/WingmanArrive.png",
                wingma14Christmas: "./images/emotes/WingmanChristmas.gif",
                wingma14Jam: "./images/emotes/WingmanJam.gif",
                wingma14LaserHit: "./images/emotes/WingmanLaserHit.png",
                wingma14Laser: "./images/emotes/WingmanLaser.png",
                wingma14Dutch: "./images/emotes/WingmanLaserDutch.png",
                wingma14Mickey: "./images/emotes/WingmanMickey.png",
                wingma14Pray: "./images/emotes/wingmanPray.png",
                wingma14Romeo: "./images/emotes/WingmanRomeo.png",
                wingma14Scared: "./images/emotes/WingmanScared.gif",
                wingma14Think: "./images/emotes/WingmanThink.png",
                wingma14Dance: "./images/emotes/WingmanDance.gif",
            }

            // Function to get platform icon
            const getPlatformIcon = (platform) => {
                switch (platform) {
                    case "youtube":
                        return "./images/icons/youtube-icon.png"
                    case "twitch":
                        return "./images/icons/twitch-icon.png"
                    case "system":
                    default:
                        return "./images/icons/wrench-icon.png" // https://iconduck.com/icons/255547/setting-wrench
                }
            }

            // Function to render badges
            const renderBadges = (msg) => {
                const badges = []

                // Check for Twitch badges
                if (
                    msg.twitchSpecific &&
                    msg.twitchSpecific.badges &&
                    Array.isArray(msg.twitchSpecific.badges)
                ) {
                    msg.twitchSpecific.badges.forEach((badge, index) => {
                        badges.push(
                            <img
                                key={`twitch-badge-${index}`}
                                className="badge-icon"
                                src={badge.image_url_4x}
                                alt={badge.id || "Badge"}
                                title={badge.id || "Badge"}
                            />
                        )
                    })
                }

                return badges
            }

            // Function to parse message text and replace emotes
            const parseMessageWithEmotes = (text, msgEmoteMap) => {
                if (!text) return []

                // Combine predefined emotes with message-specific emotes
                const combinedEmoteMap = { ...emoteMap }

                // Add message-specific emotes if they exist
                if (msgEmoteMap && Array.isArray(msgEmoteMap)) {
                    msgEmoteMap.forEach((emote) => {
                        if (emote.name && emote.url) {
                            combinedEmoteMap[emote.name] = emote.url
                        }
                    })
                }

                // Split the text by potential emotes
                const parts = []
                let lastIndex = 0

                const escapedKeys = Object.keys(combinedEmoteMap).map((key) =>
                    key.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")
                )

                // Regular expression to find emote patterns
                const emotePattern = new RegExp(
                    `(${escapedKeys.join("|")})`,
                    "g"
                )

                let match
                while ((match = emotePattern.exec(text)) !== null) {
                    // Add text before the emote
                    if (match.index > lastIndex) {
                        parts.push({
                            type: "text",
                            content: text.substring(lastIndex, match.index),
                        })
                    }

                    // Add the emote
                    parts.push({
                        type: "emote",
                        content: match[0],
                        src: combinedEmoteMap[match[0]],
                    })

                    lastIndex = match.index + match[0].length
                }

                // Add remaining text
                if (lastIndex < text.length) {
                    parts.push({
                        type: "text",
                        content: text.substring(lastIndex),
                    })
                }

                return parts.length > 0
                    ? parts
                    : [{ type: "text", content: text }]
            }

            // Alphabet color mapping - high contrast colors for dark backgrounds
            const alphabetColors = {
                a: "#FF0000", // Saturated red
                b: "#00FF00", // Saturated green
                c: "#0000FF", // Saturated blue
                d: "#FFFF00", // Saturated yellow
                e: "#FF00FF", // Saturated magenta
                f: "#00FFFF", // Saturated cyan
                g: "#FF6600", // Saturated orange
                h: "#00FF66", // Saturated mint
                i: "#6600FF", // Saturated purple
                j: "#FFFF00", // Saturated yellow (was pale)
                k: "#FF0066", // Saturated pink
                l: "#00FFFF", // Saturated cyan (was pale)
                m: "#FFFFFF", // White (unchanged)
                n: "#FF3333", // More saturated red
                o: "#33FF33", // More saturated green
                p: "#3333FF", // More saturated blue
                q: "#FFFF33", // More saturated yellow
                r: "#FF33FF", // More saturated magenta
                s: "#33FFFF", // More saturated cyan
                t: "#FF9900", // More saturated orange
                u: "#33FF99", // More saturated mint
                v: "#9933FF", // More saturated purple
                w: "#FFFF66", // More saturated yellow
                x: "#FF3399", // More saturated pink
                y: "#66FFFF", // More saturated cyan
                z: "#CCCCCC", // Light gray (more saturated than near-white)
            }

            // Default color for non-alphabet characters
            const defaultColor = "#BBBBBB" // Light grey

            // Function to get color for author name
            const getAuthorColor = (name) => {
                if (!name || name.length === 0) return defaultColor

                // Get first character and convert to lowercase
                const firstChar = name.charAt(0).toLowerCase()

                // Return the corresponding color or default if not a letter
                return alphabetColors[firstChar] || defaultColor
            }

            // Function to determine if a color is dark
            const isColorDark = (color) => {
                // Handle hex colors
                if (color.startsWith("#")) {
                    let r, g, b

                    if (color.length === 4) {
                        // #RGB format
                        r = parseInt(color[1] + color[1], 16)
                        g = parseInt(color[2] + color[2], 16)
                        b = parseInt(color[3] + color[3], 16)
                    } else {
                        // #RRGGBB format
                        r = parseInt(color.slice(1, 3), 16)
                        g = parseInt(color.slice(3, 5), 16)
                        b = parseInt(color.slice(5, 7), 16)
                    }

                    // Calculate relative luminance using the formula for sRGB
                    const luminance = r / 255 + g / 255 + b / 255

                    // If luminance is low (dark color), return true
                    return luminance < 0.2
                }

                // Handle rgb/rgba colors
                if (color.startsWith("rgb")) {
                    const rgbMatch = color.match(
                        /rgba?\((\d+),\s*(\d+),\s*(\d+)(?:,\s*[\d.]+)?\)/
                    )
                    if (rgbMatch) {
                        const r = parseInt(rgbMatch[1], 10)
                        const g = parseInt(rgbMatch[2], 10)
                        const b = parseInt(rgbMatch[3], 10)

                        const luminance = r / 255 + g / 255 + b / 255
                        return luminance < 0.2
                    }
                }

                // Default to false if color format is not recognized
                return false
            }

            // Message Component
            const Message = ({ msg }) => {
                // Get color for this author
                let authorColor = getAuthorColor(msg.author.displayName)
                if (msg.author.colour) {
                    authorColor = msg.author.colour
                }

                // Determine if this is a special message
                const isSpecialMessage = () => {
                    // Check for Twitch bits
                    if (
                        msg.twitchSpecific &&
                        msg.twitchSpecific.bits &&
                        msg.twitchSpecific.bits > 0
                    ) {
                        return "bits-message"
                    }

                    // Check for YouTube SuperChat
                    if (msg.youtubeSpecific && msg.youtubeSpecific.isSuperChat) {
                        return "superchat-message"
                    }

                    // Route by messageType category
                    if (msg.twitchSpecific && msg.twitchSpecific.messageType) {
                        const category = msg.twitchSpecific.messageType.category
                        if (category === "chat") return "action-message"
                        if (category === "subscription") return "sub-message"
                        if (category === "moderation") return "moderation-message"
                        if (category === "activity") return "activity-message"
                        if (category === "notification") return "notification-message"
                    }

                    // Twitch highlighted chat message
                    if (
                        msg.twitchSpecific &&
                        msg.twitchSpecific.isHighlighted
                    ) {
                        return "highlighted-message"
                    }

                    return ""
                }

                const specialMessageClass = isSpecialMessage()
                const isBackgroundMessage = specialMessageClass && specialMessageClass !== "action-message"

                return (
                    <div
                        className={`message ${
                            isBackgroundMessage
                                ? "special-message " + specialMessageClass
                                : specialMessageClass || ""
                        }`}
                    >
                        <div className="icons-container">
                            <img
                                className="platform-icon"
                                src={getPlatformIcon(msg.platform)}
                                alt={msg.platform}
                            />
                            {/* Render badges from Twitch or other platforms */}
                            {renderBadges(msg)}
                        </div>
                        <div
                            className="author"
                            style={{
                                color: authorColor,
                                "-webkit-text-stroke": isColorDark(authorColor)
                                    ? "0.04em #aaa"
                                    : "none",
                            }}
                        >
                            {msg.author.displayName}:
                        </div>
                        <div className="message-text">
                            {parseMessageWithEmotes(
                                msg.message.text,
                                msg.message.emoteMap
                            ).map((part, i) =>
                                part.type === "text" ? (
                                    <span key={i}>{part.content}</span>
                                ) : (
                                    <img
                                        key={i}
                                        src={part.src}
                                        alt={part.content}
                                        className="inline-emote"
                                        title={part.content}
                                    />
                                )
                            )}
                        </div>
                    </div>
                )
            }

            // Parse URL parameters
            function parseUrlParams() {
                const urlParams = new URLSearchParams(window.location.search)
                const params = {}

                for (const [key, value] of urlParams) {
                    params[key] = value
                }

                return params
            }

             // Admin Panel Component
            const AdminPanel = ({ onSendMessage }) => {
                const [youtubeToggleState, setYoutubeToggleState] = useState("auto") // "auto", "force_on", "force_off"

                const handleYoutubeToggle = () => {
                    let nextState, command, buttonText

                    switch (youtubeToggleState) {
                        case "auto":
                            nextState = "force_on"
                            command = "!youtube_toggle_on"
                            buttonText = "YT: Force ON"
                            break
                        case "force_on":
                            nextState = "force_off"
                            command = "!youtube_toggle_off"
                            buttonText = "YT: Force OFF"
                            break
                        case "force_off":
                            nextState = "auto"
                            command = "!youtube_toggle_auto"
                            buttonText = "YT: Auto"
                            break
                        default:
                            nextState = "auto"
                            command = "!youtube_toggle_auto"
                            buttonText = "YT: Auto"
                    }

                    setYoutubeToggleState(nextState)
                    onSendMessage(command, "system")
                }

                const getYoutubeButtonText = () => {
                    switch (youtubeToggleState) {
                        case "auto": return "YT: Auto"
                        case "force_on": return "YT: Force ON"
                        case "force_off": return "YT: Force OFF"
                        default: return "YT: Auto"
                    }
                }

                const getYoutubeButtonColor = () => {
                    switch (youtubeToggleState) {
                        case "auto": return "#444444"
                        case "force_on": return "#008800"
                        case "force_off": return "#880000"
                        default: return "#444444"
                    }
                }

                return (
                    <div className="admin-panel-container">
                        <button
                            className="admin-ad-button"
                            onClick={() => onSendMessage("!runad 30", "system")}
                        >
                            30sec Ad
                        </button>
                        <button
                            className="admin-ad-button"
                            onClick={() => onSendMessage("!runad 60", "system")}
                        >
                            60sec Ad
                        </button>
                        <button
                            className="admin-ad-button"
                            onClick={() => onSendMessage("!runad 90", "system")}
                        >
                            90sec Ad
                        </button>
                        <button
                            className="admin-ad-button"
                            onClick={() => onSendMessage("!runad 120", "system")}
                        >
                            120sec Ad
                        </button>
                        <button
                            className="admin-ad-button"
                            style={{ backgroundColor: getYoutubeButtonColor() }}
                            onClick={handleYoutubeToggle}
                        >
                            {getYoutubeButtonText()}
                        </button>
                    </div>
                )
            }

            // Admin Input Component
            const AdminInput = ({ onSendMessage }) => {
                const [inputText, setInputText] = useState("")

                const onSendMessageWrapper = (platform) => {
                    if (inputText.trim()) {
                        onSendMessage(inputText, platform)
                        setInputText("")
                    }
                }

                const handleKeyDown = (e) => {
                    if (e.key === "Enter") {
                        onSendMessageWrapper("all")
                    }
                }

                return (
                        <div className="admin-input-container">
                            <input
                                type="text"
                                className="admin-input"
                                value={inputText}
                                onChange={(e) => setInputText(e.target.value)}
                                onKeyDown={handleKeyDown}
                                placeholder="Type a message..."
                            />
                            <button
                                className="admin-send-button"
                                style={{ borderRadius: "0" }}
                                onClick={() => onSendMessageWrapper("all")}
                            >
                                Send
                            </button>
                            <button
                                className="admin-send-button"
                                style={{ backgroundColor: "#6441a5", borderRadius: "0" }}
                                onClick={() => onSendMessageWrapper("twitch")}
                            >
                                Twitch
                            </button>
                            <button
                                className="admin-send-button"
                                style={{ backgroundColor: "#ff0000", borderRadius: "0" }}
                                onClick={() => onSendMessageWrapper("youtube")}
                            >
                                YouTube
                            </button>
                            <button
                                className="admin-send-button"
                                style={{ backgroundColor: "#bbbbbb", borderRadius: "0 4px 4px 0" }}
                                onClick={() => onSendMessageWrapper("system")}
                            >
                                System
                            </button>
                        </div>
                    )
            }

            // Chat Application
            const ChatApp = () => {
                const [messages, setMessages] = useState([])
                const [socket, setSocket] = useState(null)
                const [connectionStatus, setConnectionStatus] = useState('disconnected') // 'connecting', 'connected', 'disconnected'
                const messageWindowRef = useRef(null)
                const reconnectTimeoutRef = useRef(null)
                const reconnectAttemptsRef = useRef(0)
                const params = parseUrlParams()
                const isAdminMode = params.admin === "true"

                const connectWebSocket = () => {
                    // Clear any existing reconnect timeout
                    if (reconnectTimeoutRef.current) {
                        clearTimeout(reconnectTimeoutRef.current)
                        reconnectTimeoutRef.current = null
                    }

                    setConnectionStatus('connecting')
                    console.log(`Attempting to connect to WebSocket server (attempt ${reconnectAttemptsRef.current + 1})`)
                    
                    const protocol = location.protocol === "https:" ? "wss:" : "ws:"
                    const ws = new WebSocket(`${protocol}//${location.host}/ws/chat`)

                    ws.onopen = () => {
                        console.log("Connected to WebSocket server")
                        setConnectionStatus('connected')
                        reconnectAttemptsRef.current = 0 // Reset reconnect attempts on successful connection
                    }

                    ws.onmessage = (event) => {
                        try {
                            const message = JSON.parse(event.data)
                            if (
                                !isAdminMode &&
                                message.channel.name === "Admin"
                            ) {
                                return
                            } else {
                                // Before adding new content or updating messages
                                if (messageWindowRef.current) {
                                    // Check if user is already at the bottom (or very close)
                                    const element = messageWindowRef.current
                                    const isAtBottom =
                                        element.scrollHeight -
                                            element.scrollTop -
                                            element.clientHeight <
                                        40 // 40px threshold

                                    // Store this information for use after updating
                                    messageWindowRef.current._wasAtBottom =
                                        isAtBottom
                                }

                                setMessages((prevMessages) => {
                                    // In admin mode, keep all messages
                                    // In normal mode, keep only the most recent 20 messages
                                    const updatedMessages = [
                                        ...prevMessages,
                                        message,
                                    ]
                                    return isAdminMode
                                        ? updatedMessages
                                        : updatedMessages.slice(-20)
                                })
                            }
                        } catch (error) {
                            console.error("Error parsing message:", error)
                        }
                    }

                    ws.onerror = (error) => {
                        console.error("WebSocket error:", error)
                    }

                    ws.onclose = (event) => {
                        console.log("Disconnected from WebSocket server", event.code, event.reason)
                        setConnectionStatus('disconnected')
                        
                        // Attempt to reconnect with exponential backoff
                        const reconnectDelay = Math.min(1000 * Math.pow(2, reconnectAttemptsRef.current), 20000) // Cap at 30 seconds
                        reconnectAttemptsRef.current++
                        
                        console.log(`Reconnecting in ${reconnectDelay}ms...`)
                        reconnectTimeoutRef.current = setTimeout(() => {
                            connectWebSocket()
                        }, reconnectDelay)
                    }

                    setSocket(ws)
                }

                useEffect(() => {
                    // Initialize WebSocket connection
                    connectWebSocket()

                    // Clean up WebSocket connection and timeout when component unmounts
                    return () => {
                        if (reconnectTimeoutRef.current) {
                            clearTimeout(reconnectTimeoutRef.current)
                        }
                        if (socket) {
                            socket.close()
                        }
                    }
                }, [isAdminMode])

                useEffect(() => {
                    if (messageWindowRef.current) {
                        if (
                            !isAdminMode ||
                            messageWindowRef.current._wasAtBottom
                        ) {
                            // In regular mode, or at bottom, auto-scroll
                            messageWindowRef.current.scrollTop =
                                messageWindowRef.current.scrollHeight
                        }
                    }
                }, [messages, isAdminMode])

                const handleSendMessage = (text, platform = "all") => {
                    if (socket && socket.readyState === WebSocket.OPEN) {
                        // Create UnifiedChatMessage structure
                        const adminMessage = {
                            platform: platform,
                            timestamp: new Date(),
                            channel: {
                                name: platform === "system" ? "Admin" : "Wingman953",
                            },
                            author: {
                                name: "Admin",
                                displayName: "Wingman953",
                                isModerator: true,
                                isOwner: true,
                                isSubscriber: true,
                            },
                            message: {
                                text: text,
                            },
                        }

                        // Send the message over WebSocket
                        socket.send(JSON.stringify(adminMessage))
                    } else {
                        console.warn("Cannot send message: WebSocket is not connected")
                    }
                }

                return (
                    <div className="chat-container">
                        {/* Optional: Show connection status in admin mode */}
                        {isAdminMode && connectionStatus !== 'connected' && (
                            <div style={{ 
                                padding: '8px', 
                                backgroundColor: connectionStatus === 'connecting' ? '#664400' : '#660000',
                                color: 'white', 
                                textAlign: 'center', 
                                fontSize: '0.9em',
                                borderRadius: '4px',
                                marginBottom: '10px'
                            }}>
                                {connectionStatus === 'connecting' ? 'Connecting to server...' : 'Disconnected - Attempting to reconnect...'}
                            </div>
                        )}
                        
                        {isAdminMode && (
                            <AdminPanel onSendMessage={handleSendMessage} />
                        )}
                        <div
                            className={`message-window ${
                                isAdminMode ? "admin-mode" : ""
                            }`}
                            ref={messageWindowRef}
                        >
                            {messages.map((msg, index) => (
                                <Message key={index} msg={msg} />
                            ))}
                        </div>
                        {isAdminMode && (
                            <AdminInput onSendMessage={handleSendMessage} />
                        )}
                    </div>
                )
            }

            ReactDOM.render(<ChatApp />, document.getElementById("root"))
        </script>
    </body>
</html>
