<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>WebSocket Image Display</title>
        <style>
            body {
                margin: 0;
                padding: 0;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                background: #000;
            }

            img {
                max-width: 100vw;
                max-height: 100vh;
                object-fit: contain;
            }
        </style>
    </head>
    <body>
        <div id="root"></div>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

        <script>
            // Image mapping - replace URLs with your actual image URLs
            const imageMap = {
                Angry: "./images/virgil/Super-Angry.png",
                Disappointed: "./images/virgil/Super-Disappointed.png",
                Happy: "./images/virgil/Super-Happy.png",
                Neutral: "./images/virgil/Super-Neutral.png",
                Questioning: "./images/virgil/Super-Questioning.png",
                Sleep: "./images/virgil/Super-Sleep.png",
            }

            const { useState, useEffect } = React

            function ImageDisplay() {
                const [currentImage, setCurrentImage] = useState(
                    imageMap.Neutral
                )

                useEffect(() => {
                    let ws = null
                    let reconnectTimeout = null
                    let reconnectAttempts = 0
                    const reconnectDelay = 5000 // Fixed 5 second delay
                    let shouldReconnect = true

                    function connect() {
                        const protocol = location.protocol === "https:" ? "wss:" : "ws:"
                        ws = new WebSocket(`${protocol}//${location.host}/ws/virgil`)

                        ws.onopen = () => {
                            console.log("WebSocket connected")
                            reconnectAttempts = 0
                        }

                        ws.onmessage = (event) => {
                            const message = event.data.trim().replace(/['"]+/g, "")
                            console.log("Received message:", message)
                            if (imageMap[message]) {
                                console.log("Set Image:", imageMap[message])
                                setCurrentImage(imageMap[message])
                            }
                        }

                        ws.onerror = (error) => {
                            console.error("WebSocket error:", error)
                        }

                        ws.onclose = () => {
                            console.log("WebSocket disconnected")
                            if (shouldReconnect) {
                                attemptReconnect()
                            }
                        }
                    }

                    function attemptReconnect() {
                        reconnectAttempts++
                        console.log(
                            `Reconnecting in 5s (attempt ${reconnectAttempts})...`
                        )

                        reconnectTimeout = setTimeout(() => {
                            console.log("Attempting to reconnect...")
                            connect()
                        }, reconnectDelay)
                    }

                    // Initial connection
                    connect()

                    // Cleanup function
                    return () => {
                        shouldReconnect = false
                        if (reconnectTimeout) {
                            clearTimeout(reconnectTimeout)
                        }
                        if (ws) {
                            ws.close()
                        }
                    }
                }, [])

                return currentImage
                    ? React.createElement("img", {
                          src: currentImage,
                          alt: "Display",
                      })
                    : null
            }

            ReactDOM.render(
                React.createElement(ImageDisplay),
                document.getElementById("root")
            )
        </script>
    </body>
</html>
