<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>LiveSplit Data</title>
        <style>
            @font-face {
                font-family: "Denmark";
                src: url("./fonts/DENMARK.TTF") format("woff2"),
                    url("./fonts/DENMARK.TTF") format("woff");
                font-weight: normal;
                font-style: normal;
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                padding: 4px;
                font-family: "Courier New", monospace;
                background: transparent;
                color: #e0e0e0;
                max-width: 1000px;
                max-height: 250px;
                overflow: hidden;
            }

            .tableTitle {
                font-family: "Denmark", sans-serif;
                font-weight: bold;
                font-size: 1.4em;
                text-align: center;
                margin: 0 0 4px 200px;
                padding: 0;
                color: #d0d8e8;
                text-shadow: 0 0 8px rgba(100, 140, 220, 0.4);
                letter-spacing: 1px;
                transition: opacity 0.4s ease;
            }

            table {
                width: 100%;
                max-width: 100%;
                border-collapse: separate;
                border-spacing: 3px 2px;
                background: transparent;
            }

            #splitTable {
                height: 190px;
                table-layout: fixed;
            }

            th, td {
                padding: 3px 6px;
                text-align: center;
                font-size: 1.35em;
                line-height: 1.2;
                border: none;
                border-radius: 4px;
            }

            th {
                background: transparent;
                font-family: "Denmark", sans-serif;
                font-weight: bold;
                font-size: 1.4em;
                text-align: right;
                width: calc((100% - 200px) / 3);
                color: #8899bb;
                text-shadow: 0 0 6px rgba(80, 120, 200, 0.2);
            }

            .row-title {
                width: 200px;
            }

            .col-title {
                text-align: center;
                font-size: 1.25em;
                padding-bottom: 4px;
                position: relative;
            }

            /* Column panel styling - glassmorphism */
            .previous, .current, .next {
                position: relative;
                border: 1px solid rgba(255, 255, 255, 0.06);
                transition: background-color 0.5s ease,
                            border-color 0.5s ease,
                            box-shadow 0.5s ease;
            }

            .previous {
                background: rgba(45, 42, 72, 0.78);
                border-color: rgba(120, 110, 200, 0.1);
            }

            .current {
                background: rgba(35, 68, 48, 0.82);
                border-color: rgba(80, 200, 120, 0.2);
                box-shadow: inset 0 0 14px rgba(60, 180, 100, 0.08),
                            0 0 6px rgba(60, 180, 100, 0.04);
            }

            .next {
                background: rgba(38, 55, 68, 0.72);
                border-color: rgba(80, 160, 200, 0.1);
            }

            /* Time value styling */
            .time {
                font-family: "Courier New", monospace;
                font-weight: bold;
                color: #fff;
            }

            /* Cell content wrapper for animations */
            .cell-content {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                gap: 4px;
                transition: opacity 0.4s cubic-bezier(0.22, 0.61, 0.36, 1),
                            transform 0.4s cubic-bezier(0.22, 0.61, 0.36, 1);
            }

            /* Value change animation - old value exits upward */
            .cell-updating .cell-content {
                opacity: 0;
                transform: translateY(-14px) scale(0.92);
            }

            /* New value enters from below */
            .cell-entering .cell-content {
                opacity: 0;
                transform: translateY(14px) scale(0.92);
                transition: none;
            }

            .cell-updated .cell-content {
                opacity: 1;
                transform: translateY(0) scale(1);
            }

            /* Split transition - Phase 1: cascade exit to the left */
            #splitTable.split-exit td.previous .cell-content,
            #splitTable.split-exit th.col-previous {
                opacity: 0;
                transform: translateX(-30px);
                transition: opacity 0.3s ease-in,
                            transform 0.3s ease-in;
            }

            #splitTable.split-exit td.current .cell-content,
            #splitTable.split-exit th.col-current {
                opacity: 0;
                transform: translateX(-22px);
                transition: opacity 0.3s ease-in 0.05s,
                            transform 0.3s ease-in 0.05s;
            }

            #splitTable.split-exit td.next .cell-content,
            #splitTable.split-exit th.col-next {
                opacity: 0;
                transform: translateX(-16px);
                transition: opacity 0.3s ease-in 0.1s,
                            transform 0.3s ease-in 0.1s;
            }

            /* Phase 2: position for entrance (instant, no transition) */
            #splitTable.split-enter td .cell-content,
            #splitTable.split-enter th.col-previous,
            #splitTable.split-enter th.col-current,
            #splitTable.split-enter th.col-next {
                opacity: 0;
                transform: translateX(25px);
                transition: none;
            }

            /* Phase 3: cascade settle from right */
            #splitTable.split-settle td.previous .cell-content,
            #splitTable.split-settle th.col-previous {
                opacity: 1;
                transform: translateX(0);
                transition: opacity 0.35s cubic-bezier(0.22, 0.61, 0.36, 1),
                            transform 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
            }

            #splitTable.split-settle td.current .cell-content,
            #splitTable.split-settle th.col-current {
                opacity: 1;
                transform: translateX(0);
                transition: opacity 0.35s cubic-bezier(0.22, 0.61, 0.36, 1) 0.07s,
                            transform 0.35s cubic-bezier(0.22, 0.61, 0.36, 1) 0.07s;
            }

            #splitTable.split-settle td.next .cell-content,
            #splitTable.split-settle th.col-next {
                opacity: 1;
                transform: translateX(0);
                transition: opacity 0.35s cubic-bezier(0.22, 0.61, 0.36, 1) 0.14s,
                            transform 0.35s cubic-bezier(0.22, 0.61, 0.36, 1) 0.14s;
            }

            /* Trophy styling */
            .trophy-img {
                height: 1em;
                vertical-align: middle;
                filter: drop-shadow(0 0 3px rgba(255, 200, 50, 0.5));
                transition: filter 0.3s ease;
            }

            .trophy-img.gold {
                filter: drop-shadow(0 0 5px rgba(255, 200, 50, 0.6));
            }

            .trophy-img.silver {
                filter: drop-shadow(0 0 4px rgba(192, 192, 220, 0.5));
            }

            .trophy-img.bronze {
                filter: drop-shadow(0 0 4px rgba(205, 127, 50, 0.5));
            }

            .rank-text {
                font-size: 0.75em;
                color: #889;
                margin-left: 2px;
            }

            /* Column header underline accent */
            .col-title.col-previous::after,
            .col-title.col-current::after,
            .col-title.col-next::after {
                content: "";
                position: absolute;
                bottom: 0;
                left: 20%;
                width: 60%;
                height: 1px;
                border-radius: 1px;
                transition: opacity 0.4s ease;
            }

            .col-title.col-previous::after {
                background: linear-gradient(90deg, transparent, rgba(120, 110, 200, 0.4), transparent);
            }

            .col-title.col-current::after {
                background: linear-gradient(90deg, transparent, rgba(80, 200, 120, 0.5), transparent);
                height: 2px;
            }

            .col-title.col-next::after {
                background: linear-gradient(90deg, transparent, rgba(80, 170, 200, 0.35), transparent);
            }

            /* Current column header glow */
            .col-title.col-current {
                color: #a0ccaa;
                text-shadow: 0 0 8px rgba(80, 200, 120, 0.3);
            }

            /* Individual level table */
            #individualLevelTable {
                max-height: 120px;
            }

            #individualLevelTable td.current {
                min-width: 250px;
            }

            /* Pulse for split transition arrival */
            @keyframes splitPulse {
                0%   { box-shadow: inset 0 0 14px rgba(60, 180, 100, 0.08),
                                   0 0 6px rgba(60, 180, 100, 0.04); }
                15%  { box-shadow: inset 0 0 28px rgba(70, 220, 120, 0.24),
                                   0 0 14px rgba(70, 220, 120, 0.12); }
                100% { box-shadow: inset 0 0 14px rgba(60, 180, 100, 0.08),
                                   0 0 6px rgba(60, 180, 100, 0.04); }
            }

            .data-fresh .current {
                animation: splitPulse 1.6s ease-out;
            }
        </style>
    </head>
    <body>
        <h1 class="tableTitle" id="title">Category Title</h1>
        <table id="splitTable">
            <tbody>
                <tr>
                    <th></th>
                    <th class="col-title col-previous" id="previous-name">Previous Split</th>
                    <th class="col-title col-current" id="current-name">Current Split</th>
                    <th class="col-title col-next" id="next-name">Next Split</th>
                </tr>
                <tr>
                    <th class="row-title">World Record</th>
                    <td class="previous time" id="previous-worldRecord"><span class="cell-content"></span></td>
                    <td class="current time" id="current-worldRecord"><span class="cell-content"></span></td>
                    <td class="next time" id="next-worldRecord"><span class="cell-content"></span></td>
                </tr>
                <tr>
                    <th class="row-title">Personal Best</th>
                    <td class="previous time" id="previous-personalBest"><span class="cell-content"></span></td>
                    <td class="current time" id="current-personalBest"><span class="cell-content"></span></td>
                    <td class="next time" id="next-personalBest"><span class="cell-content"></span></td>
                </tr>
                <tr>
                    <th class="row-title">Best Split</th>
                    <td class="previous time" id="previous-bestSplit"><span class="cell-content"></span></td>
                    <td class="current time" id="current-bestSplit"><span class="cell-content"></span></td>
                    <td class="next time" id="next-bestSplit"><span class="cell-content"></span></td>
                </tr>
                <tr>
                    <th class="row-title">Comparison</th>
                    <td class="previous time" id="previous-currentComparison"><span class="cell-content"></span></td>
                    <td class="current time" id="current-currentComparison"><span class="cell-content"></span></td>
                    <td class="next time" id="next-currentComparison"><span class="cell-content"></span></td>
                </tr>
            </tbody>
        </table>

        <table id="individualLevelTable" style="display: none">
            <tbody>
                <tr>
                    <th class="row-title">World Record</th>
                    <td class="current time" id="il-current-worldRecord"><span class="cell-content"></span></td>
                </tr>
                <tr>
                    <th class="row-title">Personal Best</th>
                    <td class="current time" id="il-current-personalBest"><span class="cell-content"></span></td>
                </tr>
            </tbody>
        </table>

        <script>
            const trophyMap = {
                1: "./images/trophies/GoldTrophy.png",
                2: "./images/trophies/SilverTrophy.png",
                3: "./images/trophies/BronzeTrophy.png",
            }

            const trophyClass = {
                1: "gold",
                2: "silver",
                3: "bronze",
            }

            class LiveSplitDisplay {
                constructor() {
                    this.previousData = null
                    this.lastSplitIndex = null
                    this.transitionInProgress = false
                    this.connectWebSocket()
                }

                connectWebSocket() {
                    const protocol = location.protocol === "https:" ? "wss:" : "ws:"
                    this.ws = new WebSocket(`${protocol}//${location.host}/ws/splits`)

                    this.ws.onmessage = (event) => {
                        const splitInfo = JSON.parse(event.data)
                        this.updateDisplay(splitInfo)
                    }

                    this.ws.onclose = () => {
                        setTimeout(() => this.connectWebSocket(), 1000)
                    }
                }

                detectSplitTransition(splitInfo) {
                    if (!this.previousData) return false

                    // Detect a split transition by checking if the split index changed
                    if (splitInfo.splitIndex !== undefined && this.lastSplitIndex !== null) {
                        return splitInfo.splitIndex !== this.lastSplitIndex
                    }

                    // Fallback: detect transition by checking if current split name changed
                    const prevCurrentName = this.previousData.currentSplit?.name || ""
                    const newCurrentName = splitInfo.currentSplit?.name || ""
                    return prevCurrentName !== "" && newCurrentName !== "" && prevCurrentName !== newCurrentName
                }

                updateDisplay(splitInfo) {
                    const isFullGame = splitInfo.runnableSegment === "Full Game"

                    const title = document.getElementById("title")
                    const fullGameTable = document.getElementById("splitTable")
                    const individualLevelTable = document.getElementById("individualLevelTable")

                    if (isFullGame) {
                        fullGameTable.style.display = "table"
                        individualLevelTable.style.display = "none"
                        title.textContent = `${splitInfo.game} - ${splitInfo.category} - ${splitInfo.difficulty}`
                        title.style.marginTop = "0px"

                        const isTransition = this.detectSplitTransition(splitInfo)

                        if (isTransition) {
                            this.animateSplitTransition(splitInfo)
                        } else {
                            this.updateFullGameTable(splitInfo, false)
                        }
                    } else {
                        fullGameTable.style.display = "none"
                        individualLevelTable.style.display = "table"
                        title.textContent = `${splitInfo.game} - ${splitInfo.category} - ${splitInfo.runnableSegment} - ${splitInfo.difficulty}`
                        title.style.marginTop = "40px"
                        this.updateIndividualLevelTable(splitInfo)
                    }

                    this.previousData = structuredClone(splitInfo)
                    if (splitInfo.splitIndex !== undefined) {
                        this.lastSplitIndex = splitInfo.splitIndex
                    }
                }

                animateSplitTransition(splitInfo) {
                    const table = document.getElementById("splitTable")
                    this.transitionInProgress = true

                    // Phase 1: Cascade content out to the left
                    table.classList.add("split-exit")

                    setTimeout(() => {
                        // Phase 2: Position for entrance while invisible
                        table.classList.remove("split-exit")
                        table.classList.add("split-enter")
                        this.updateFullGameTable(splitInfo, false)

                        // Phase 3: Cascade content in from the right
                        requestAnimationFrame(() => {
                            requestAnimationFrame(() => {
                                table.classList.remove("split-enter")
                                table.classList.add("split-settle", "data-fresh")

                                setTimeout(() => {
                                    table.classList.remove("split-settle", "data-fresh")
                                    this.transitionInProgress = false
                                }, 1700)
                            })
                        })
                    }, 420)
                }

                setCellContent(cellId, text, trophyRank, isWorldRecord) {
                    const cell = document.getElementById(cellId)
                    if (!cell) return

                    const wrapper = cell.querySelector(".cell-content")
                    if (!wrapper) {
                        cell.textContent = text || ""
                        return
                    }

                    const oldText = wrapper.getAttribute("data-value") || ""
                    const valueChanged = oldText !== (text || "")
                    if (!valueChanged) return

                    // During split transitions, swap content silently (table-level animation handles visuals)
                    if (this.transitionInProgress) {
                        this.buildCellContent(wrapper, text, trophyRank, isWorldRecord)
                        return
                    }

                    // Per-cell animation: old value exits upward
                    cell.classList.remove("cell-updated", "cell-entering")
                    cell.classList.add("cell-updating")

                    setTimeout(() => {
                        this.buildCellContent(wrapper, text, trophyRank, isWorldRecord)

                        // New value enters from below
                        cell.classList.remove("cell-updating")
                        cell.classList.add("cell-entering")

                        requestAnimationFrame(() => {
                            requestAnimationFrame(() => {
                                cell.classList.remove("cell-entering")
                                cell.classList.add("cell-updated")
                            })
                        })
                    }, 250)
                }

                buildCellContent(wrapper, text, trophyRank, isWorldRecord) {
                    wrapper.innerHTML = ""
                    wrapper.setAttribute("data-value", text || "")

                    if (text) {
                        wrapper.appendChild(document.createTextNode(text))

                        if (isWorldRecord && text !== "") {
                            wrapper.appendChild(this.createTrophyImg(1))
                        } else if (trophyRank >= 1 && trophyRank <= 3) {
                            wrapper.appendChild(this.createTrophyImg(trophyRank))
                        } else if (trophyRank >= 4) {
                            const rankSpan = document.createElement("span")
                            rankSpan.className = "rank-text"
                            rankSpan.textContent = `(${trophyRank}${this.getOrdinalSuffix(trophyRank)})`
                            wrapper.appendChild(rankSpan)
                        }
                    }
                }

                createTrophyImg(rank) {
                    const img = document.createElement("img")
                    img.src = trophyMap[rank]
                    img.className = `trophy-img ${trophyClass[rank] || ""}`
                    return img
                }

                updateFullGameTable(splitInfo, animate) {
                    // Previous split
                    const prevName = document.getElementById("previous-name")
                    prevName.textContent = splitInfo.previousSplit.name || "Previous Split"

                    this.setCellContent("previous-worldRecord",
                        splitInfo.previousSplit.worldRecord, 0, !!splitInfo.previousSplit.worldRecord)
                    this.setCellContent("previous-personalBest",
                        splitInfo.previousSplit.personalBest, splitInfo.previousSplit.pbRank || 0, false)
                    this.setCellContent("previous-bestSplit",
                        splitInfo.previousSplit.bestSplit, 0, false)
                    this.setCellContent("previous-currentComparison",
                        splitInfo.previousSplit.currentComparison, 0, false)

                    // Current split
                    const currentName = document.getElementById("current-name")
                    currentName.textContent = splitInfo.currentSplit.name || "Current Split"

                    this.setCellContent("current-worldRecord",
                        splitInfo.currentSplit.worldRecord, 0, !!splitInfo.currentSplit.worldRecord)
                    this.setCellContent("current-personalBest",
                        splitInfo.currentSplit.personalBest, splitInfo.currentSplit.pbRank || 0, false)
                    this.setCellContent("current-bestSplit",
                        splitInfo.currentSplit.bestSplit, 0, false)
                    this.setCellContent("current-currentComparison",
                        splitInfo.currentSplit.currentComparison, 0, false)

                    // Next split
                    const nextName = document.getElementById("next-name")
                    nextName.textContent = splitInfo.nextSplit.name || "Next Split"

                    this.setCellContent("next-worldRecord",
                        splitInfo.nextSplit.worldRecord, 0, !!splitInfo.nextSplit.worldRecord)
                    this.setCellContent("next-personalBest",
                        splitInfo.nextSplit.personalBest, splitInfo.nextSplit.pbRank || 0, false)
                    this.setCellContent("next-bestSplit",
                        splitInfo.nextSplit.bestSplit, 0, false)
                    this.setCellContent("next-currentComparison",
                        splitInfo.nextSplit.currentComparison, 0, false)
                }

                updateIndividualLevelTable(splitInfo) {
                    this.setCellContent("il-current-worldRecord",
                        splitInfo.currentSplit.worldRecord, 0, !!splitInfo.currentSplit.worldRecord)
                    this.setCellContent("il-current-personalBest",
                        splitInfo.currentSplit.personalBest, splitInfo.currentSplit.pbRank || 0, false)
                }

                getOrdinalSuffix(num) {
                    const j = num % 10,
                        k = num % 100
                    if (j == 1 && k != 11) return "st"
                    if (j == 2 && k != 12) return "nd"
                    if (j == 3 && k != 13) return "rd"
                    return "th"
                }
            }

            new LiveSplitDisplay()
        </script>
    </body>
</html>
