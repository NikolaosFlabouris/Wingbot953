<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>LiveSplit Data</title>
        <style>
            @font-face {
                font-family: "Denmark";
                src: url("./fonts/DENMARK.TTF") format("woff2"),
                    url("./fonts/DENMARK.TTF") format("woff");
                font-weight: normal;
                font-style: normal;
            }

            .tableTitle {
                background: #00000000;
                font-family: "Denmark", sans-serif;
                font-weight: bold;
                font-size: 1.5em;
                text-align: center;
                border: none;
                margin-left: 220px;
            }

            /* Increase the base font size for table cells */
            th,
            td {
                padding: 3px 5px; /* Reduce padding slightly */
                text-align: center;
                border: 1px solid #444;
                font-size: 1.4em;
                line-height: 1.2; /* Add tighter line height */
            }

            /* Increase header font size */
            th {
                background: #00000000;
                font-family: "Denmark", sans-serif;
                font-weight: bold;
                font-size: 1.5em;
                text-align: right;
                width: calc((100% - 220px) / 3);
                border: none;
            }

            .row-title {
                width: 220px; /* Limit width of row titles */
            }

            .col-title {
                text-align: center;
            }

            .previous {
                background: #2a2a3a;
            }
            .current {
                background: #2a3a2a;
            }
            .next {
                background: #2a383a;
            }

            .time {
                font-family: "Courier New", monospace;
                font-weight: bold;
                color: #fff;
            }

            /* Make table fill available space */
            table {
                height: 190px;
                width: 100%;
                max-width: 100%; /* Ensure it doesn't exceed viewport */
                border: none;
                /* border: 2px solid #444; */
                border-collapse: collapse;
                background: #00000000;
            }

            /* Optimize padding in the body */
            body {
                margin: 0;
                padding: 3px;
                font-family: "Courier New", monospace;
                background: #000;
                color: #fff;
                max-width: 1000px;
                max-height: 250px;
            }

            /* Reduce spacing around headings if any exist in table */
            h1,
            h2,
            h3,
            h4,
            h5,
            h6 {
                margin: 0.3em 0; /* Tighter margins */
            }
        </style>
    </head>
    <body>
        <h1 class="tableTitle" id="title">Category Title</h1>
        <table id="splitTable">
            <tbody>
                <tr>
                    <th></th>
                    <th class="col-title" id="previous-name">Previous Split</th>
                    <th class="col-title" id="current-name">Current Split</th>
                    <th class="col-title" id="next-name">Next Split</th>
                </tr>
                <tr>
                    <th class="row-title">World Record</th>
                    <td class="previous time" id="previous-worldRecord"></td>
                    <td class="current time" id="current-worldRecord"></td>
                    <td class="next time" id="next-worldRecord"></td>
                </tr>
                <tr>
                    <th class="row-title">Personal Best</th>
                    <td class="previous time" id="previous-personalBest"></td>
                    <td class="current time" id="current-personalBest"></td>
                    <td class="next time" id="next-personalBest"></td>
                </tr>
                <tr>
                    <th class="row-title">Best Split</th>
                    <td class="previous time" id="previous-bestSplit"></td>
                    <td class="current time" id="current-bestSplit"></td>
                    <td class="next time" id="next-bestSplit"></td>
                </tr>
                <tr>
                    <th class="row-title">Comparison Split</th>
                    <td
                        class="previous time"
                        id="previous-currentComparison"
                    ></td>
                    <td
                        class="current time"
                        id="current-currentComparison"
                    ></td>
                    <td class="next time" id="next-currentComparison"></td>
                </tr>
            </tbody>
        </table>

        <table id="individualLevelTable" style="display: none; max-height: 120px;">
            <tbody>
                <tr>
                    <th class="row-title">World Record</th>
                    <td class="current time" id="il-current-worldRecord"></td>
                </tr>
                <tr>
                    <th class="row-title">Personal Best</th>
                    <td class="current time" id="il-current-personalBest"></td>
                </tr>
            </tbody>
        </table>

        <script>
            const trophyMap = {
                1: "./images/trophies/GoldTrophy.png",
                2: "./images/trophies/SilverTrophy.png",
                3: "./images/trophies/BronzeTrophy.png",
            }

            class LiveSplitDisplay {
                constructor() {
                    this.connectWebSocket()
                }

                connectWebSocket() {
                    this.ws = new WebSocket("ws://localhost:8082")

                    this.ws.onmessage = (event) => {
                        const splitInfo = JSON.parse(event.data)
                        this.updateDisplay(splitInfo)
                    }

                    this.ws.onclose = () => {
                        setTimeout(() => this.connectWebSocket(), 1000)
                    }
                }

                updateDisplay(splitInfo) {
                    // Determine which table to show
                    const isFullGame = splitInfo.runnableSegment === "Full Game"
                    
                    const title = document.getElementById("title")
                    const fullGameTable = document.getElementById("splitTable")
                    const individualLevelTable = document.getElementById("individualLevelTable")
                    
                    if (isFullGame) {
                        fullGameTable.style.display = "table"
                        individualLevelTable.style.display = "none"
                        title.textContent = `${splitInfo.game} - ${splitInfo.category} - ${splitInfo.difficulty}`
                        title.style.marginTop = "0px"
                        this.updateFullGameTable(splitInfo)
                    } else {
                        fullGameTable.style.display = "none"
                        individualLevelTable.style.display = "table"
                        title.textContent = `${splitInfo.game} - ${splitInfo.category} - ${splitInfo.runnableSegment} - ${splitInfo.difficulty}`
                        title.style.marginTop = "40px"
                        this.updateIndividualLevelTable(splitInfo)
                    }
                }

                updateFullGameTable(splitInfo) {
                    // Helper function to add trophy to an element
                    const addTrophy = (element, rank) => {
                        if (rank >= 1 && rank <= 3) {
                            const trophyImg = document.createElement("img")
                            trophyImg.src = trophyMap[rank]
                            trophyImg.style.height = "1em"
                            trophyImg.style.marginLeft = "5px"
                            trophyImg.style.verticalAlign = "middle"
                            element.appendChild(trophyImg)
                        } else if (rank >= 4) {
                            const rankSpan = document.createElement("span")
                            rankSpan.textContent = ` (${rank}${this.getOrdinalSuffix(
                                rank
                            )})`
                            rankSpan.style.fontSize = "0.8em"
                            rankSpan.style.color = "#aaa"
                            element.appendChild(rankSpan)
                        }
                    }

                    if (!splitInfo.previousSplit.name || splitInfo.previousSplit.name === "") {
                        document.getElementById("previous-name").textContent = "Previous Split"
                    } else {
                        document.getElementById("previous-name").textContent =
                            splitInfo.previousSplit.name
                    }
                    document.getElementById("previous-name").textContent =
                            splitInfo.previousSplit.name

                    // World Record - add gold trophy if value exists
                    const prevWorldRecordEl = document.getElementById(
                        "previous-worldRecord"
                    )
                    prevWorldRecordEl.textContent =
                        splitInfo.previousSplit.worldRecord
                    if (
                        splitInfo.previousSplit.worldRecord &&
                        splitInfo.previousSplit.worldRecord !== ""
                    ) {
                        const trophyImg = document.createElement("img")
                        trophyImg.src = trophyMap[1] // Gold trophy
                        trophyImg.style.height = "1em"
                        trophyImg.style.marginLeft = "5px"
                        trophyImg.style.verticalAlign = "middle"
                        prevWorldRecordEl.appendChild(trophyImg)
                    }

                    // Personal Best - add rank information
                    const prevPBEl = document.getElementById(
                        "previous-personalBest"
                    )
                    prevPBEl.textContent = splitInfo.previousSplit.personalBest
                    if (
                        splitInfo.previousSplit.personalBest &&
                        splitInfo.previousSplit.personalBest !== ""
                    ) {
                        addTrophy(prevPBEl, splitInfo.previousSplit.pbRank || 0)
                    }

                    document.getElementById("previous-bestSplit").textContent =
                        splitInfo.previousSplit.bestSplit
                    document.getElementById(
                        "previous-currentComparison"
                    ).textContent = splitInfo.previousSplit.currentComparison

                    // Update current split data
                    if (!splitInfo.currentSplit.name || splitInfo.currentSplit.name === "") {
                        document.getElementById("current-name").textContent = "Current Split"
                    } else {
                        document.getElementById("current-name").textContent =
                            splitInfo.currentSplit.name
                    }
                        document.getElementById("current-name").textContent =
                            splitInfo.currentSplit.name

                    // World Record - add gold trophy if value exists
                    const currentWorldRecordEl = document.getElementById(
                        "current-worldRecord"
                    )
                    currentWorldRecordEl.textContent =
                        splitInfo.currentSplit.worldRecord
                    if (
                        splitInfo.currentSplit.worldRecord &&
                        splitInfo.currentSplit.worldRecord !== ""
                    ) {
                        const trophyImg = document.createElement("img")
                        trophyImg.src = trophyMap[1] // Gold trophy
                        trophyImg.style.height = "1em"
                        trophyImg.style.marginLeft = "5px"
                        trophyImg.style.verticalAlign = "middle"
                        currentWorldRecordEl.appendChild(trophyImg)
                    }

                    // Personal Best - add rank information
                    const currentPBEl = document.getElementById(
                        "current-personalBest"
                    )
                    currentPBEl.textContent =
                        splitInfo.currentSplit.personalBest
                    if (
                        splitInfo.currentSplit.personalBest &&
                        splitInfo.currentSplit.personalBest !== ""
                    ) {
                        addTrophy(
                            currentPBEl,
                            splitInfo.currentSplit.pbRank || 0
                        )
                    }

                    document.getElementById("current-bestSplit").textContent =
                        splitInfo.currentSplit.bestSplit
                    document.getElementById(
                        "current-currentComparison"
                    ).textContent = splitInfo.currentSplit.currentComparison

                    // Update next split data
                    if (!splitInfo.nextSplit.name || splitInfo.nextSplit.name === "") {
                        document.getElementById("next-name").textContent = "Next Split"
                    } else {
                        document.getElementById("next-name").textContent =
                            splitInfo.nextSplit.name
                    }
                        document.getElementById("next-name").textContent =
                            splitInfo.nextSplit.name

                    // World Record - add gold trophy if value exists
                    const nextWorldRecordEl =
                        document.getElementById("next-worldRecord")
                    nextWorldRecordEl.textContent =
                        splitInfo.nextSplit.worldRecord
                    if (
                        splitInfo.nextSplit.worldRecord &&
                        splitInfo.nextSplit.worldRecord !== ""
                    ) {
                        const trophyImg = document.createElement("img")
                        trophyImg.src = trophyMap[1] // Gold trophy
                        trophyImg.style.height = "1em"
                        trophyImg.style.marginLeft = "5px"
                        trophyImg.style.verticalAlign = "middle"
                        nextWorldRecordEl.appendChild(trophyImg)
                    }

                    // Personal Best - add rank information
                    const nextPBEl =
                        document.getElementById("next-personalBest")
                    nextPBEl.textContent = splitInfo.nextSplit.personalBest
                    if (
                        splitInfo.nextSplit.personalBest &&
                        splitInfo.nextSplit.personalBest !== ""
                    ) {
                        addTrophy(nextPBEl, splitInfo.nextSplit.pbRank || 0)
                    }

                    document.getElementById("next-bestSplit").textContent =
                        splitInfo.nextSplit.bestSplit
                    document.getElementById(
                        "next-currentComparison"
                    ).textContent = splitInfo.nextSplit.currentComparison
                }

                updateIndividualLevelTable(splitInfo) {
                    // Helper function to add trophy to an element
                    const addTrophy = (element, rank) => {
                        if (rank >= 1 && rank <= 3) {
                            const trophyImg = document.createElement("img")
                            trophyImg.src = trophyMap[rank]
                            trophyImg.style.height = "1em"
                            trophyImg.style.marginLeft = "5px"
                            trophyImg.style.verticalAlign = "middle"
                            element.appendChild(trophyImg)
                        } else if (rank >= 4) {
                            const rankSpan = document.createElement("span")
                            rankSpan.textContent = ` (${rank}${this.getOrdinalSuffix(
                                rank
                            )})`
                            rankSpan.style.fontSize = "0.8em"
                            rankSpan.style.color = "#aaa"
                            element.appendChild(rankSpan)
                        }
                    }

                    // World Record - add gold trophy if value exists
                    const currentWorldRecordEl = document.getElementById(
                        "il-current-worldRecord"
                    )
                    currentWorldRecordEl.innerHTML = "" // Clear previous content
                    currentWorldRecordEl.textContent =
                        splitInfo.currentSplit.worldRecord
                    if (
                        splitInfo.currentSplit.worldRecord &&
                        splitInfo.currentSplit.worldRecord !== ""
                    ) {
                        const trophyImg = document.createElement("img")
                        trophyImg.src = trophyMap[1] // Gold trophy
                        trophyImg.style.height = "1em"
                        trophyImg.style.marginLeft = "5px"
                        trophyImg.style.verticalAlign = "middle"
                        currentWorldRecordEl.appendChild(trophyImg)
                    }

                    // Personal Best - add rank information
                    const currentPBEl = document.getElementById(
                        "il-current-personalBest"
                    )
                    currentPBEl.innerHTML = "" // Clear previous content
                    currentPBEl.textContent =
                        splitInfo.currentSplit.personalBest
                    if (
                        splitInfo.currentSplit.personalBest &&
                        splitInfo.currentSplit.personalBest !== ""
                    ) {
                        addTrophy(
                            currentPBEl,
                            splitInfo.currentSplit.pbRank || 0
                        )
                    }
                }

                // Helper function to get ordinal suffix
                getOrdinalSuffix(num) {
                    const j = num % 10,
                        k = num % 100
                    if (j == 1 && k != 11) {
                        return "st"
                    }
                    if (j == 2 && k != 12) {
                        return "nd"
                    }
                    if (j == 3 && k != 13) {
                        return "rd"
                    }
                    return "th"
                }
            }

            new LiveSplitDisplay()
        </script>
    </body>
</html>
